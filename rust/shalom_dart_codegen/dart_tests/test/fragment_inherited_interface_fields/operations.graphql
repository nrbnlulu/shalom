fragment ToyFrag on Toy {
  id
  label
}

fragment CommonAnimalFrag on Animal {
  id
  name
  species
}

fragment AnimalWithToysFrag on Animal {
  ...CommonAnimalFrag
  toys {
    ...ToyFrag
  }
}

fragment ElephantWithToysFrag on Elephant {
  ...AnimalWithToysFrag
  trunkLength
}

fragment MinimalAnimalNestedFrag on Elephant {
  favoriteToy {
    id
  }
  status {
    __typename
    ... on MovementStatus {
      motionType
      channelAlert {
        __typename
      }
    }
  }
}

fragment MileSightChannelAlertFrag on ChannelAlertInterface {
  __typename
  channelName
  ... on MileSightChannelAlert {
    confidence
  }
}

fragment MovementStatusWithChannelAlertFrag on MovementStatus {
  channelAlert {
    ...MileSightChannelAlertFrag
  }
}

fragment ExtendedAnimalNestedFrag on Elephant {
  ...MinimalAnimalNestedFrag
  favoriteToy {
    label
  }
  status {
    ... on StatusInterface {
      originMessage
    }
    ... on MovementStatus {
      sensitivity
      ...MovementStatusWithChannelAlertFrag
    }
  }
}

fragment AnimalWithToysGlobalFrag on Animal {
  __typename
  ...AnimalWithToysFrag
  ...ElephantWithToysFrag
}

query ZooAnimalsQuery {
  animals {
    ...AnimalWithToysGlobalFrag
  }
}

query ElephantNestedQuery {
  animals {
    __typename
    ...ExtendedAnimalNestedFrag
  }
}
