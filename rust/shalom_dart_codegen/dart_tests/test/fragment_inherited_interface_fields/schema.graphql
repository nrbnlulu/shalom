type Query {
  animals: [Animal!]!
}

interface Animal {
  id: ID!
  name: String!
  species: String!
  toys: [Toy!]!
  favoriteToy: Toy!
  status: AnimalStatus!
}

type Toy {
  id: ID!
  label: String!
}

interface StatusInterface {
  originMessage: String!
}

interface ChannelAlertInterface {
  channelName: String!
}

type MileSightChannelAlert implements ChannelAlertInterface {
  channelName: String!
  confidence: Int!
}

type MovementStatus implements StatusInterface {
  originMessage: String!
  motionType: String!
  sensitivity: Int!
  channelAlert: ChannelAlertInterface!
}

type IdleStatus implements StatusInterface {
  originMessage: String!
  idleSince: String!
}

union AnimalStatus = MovementStatus | IdleStatus

type Monkey implements Animal {
  id: ID!
  name: String!
  species: String!
  toys: [Toy!]!
  favoriteToy: Toy!
  status: AnimalStatus!
  bananaCount: Int!
}

type Elephant implements Animal {
  id: ID!
  name: String!
  species: String!
  toys: [Toy!]!
  favoriteToy: Toy!
  status: AnimalStatus!
  trunkLength: Int!
}
