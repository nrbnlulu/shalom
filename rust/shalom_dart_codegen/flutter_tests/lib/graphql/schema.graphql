type Query {
  user(id: ID!): User
  pet(id: ID!): Pet
  animal(id: ID!): Animal
  animals: [Animal!]!
  zoo(id: ID!): Zoo
}

type Subscription {
  shelterAnimals: Animal!
  streetAnimals: Animal!
}

type Zoo {
  id: ID!
  name: String!
  cages: [Cage!]!
  animals: [Animal!]!
}

type Cage {
  id: ID!
  name: String!
}

type User {
  id: ID!
  name: String!
  email: String!
}

type Pet {
  id: ID!
  name: String!
}

interface Animal {
  id: ID!
}

interface HasFavoriteToy {
  favoriteToy: Toy!
}

interface StatusInterface {
  originMessage: String!
}

type MovementStatus implements StatusInterface {
  originMessage: String!
  motionType: String!
  sensitivity: Int!
}

type IdleStatus implements StatusInterface {
  originMessage: String!
  idleSince: String!
}

union AnimalStatus = MovementStatus | IdleStatus

type Toy {
  id: ID!
  label: String!
}

type Owner {
  id: ID!
  name: String!
}

type Dog implements Animal & HasFavoriteToy {
  id: ID!
  name: String!
  breed: String!
  owner: Owner
  favoriteToy: Toy!
  status: AnimalStatus!
}

type Cat implements Animal {
  id: ID!
  name: String!
  color: String!
}
