type Query {
  user(id: ID!): User
  pet(id: ID!): Pet
  animal(id: ID!): Animal
  zoo(id: ID!): Zoo
}

type Subscription {
  shelterAnimals: Animal!
  streetAnimals: Animal!
}

type Zoo {
  id: ID!
  name: String!
  cages: [Cage!]!
}

type Cage {
  id: ID!
  name: String!
}

type User {
  id: ID!
  name: String!
}

type Pet {
  id: ID!
  name: String!
}

interface Animal {
  id: ID!
}

type Dog implements Animal {
  id: ID!
  name: String!
  breed: String!
}

type Cat implements Animal {
  id: ID!
  name: String!
  color: String!
}
