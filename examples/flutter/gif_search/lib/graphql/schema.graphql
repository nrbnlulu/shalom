type Album {
  id: String!
  name: String!
  gifs: [Gif!]!
  tag: String!
}

type AlbumEvent {
  kind: AlbumEventKind!
  album: Album!
  gif: Gif
}

enum AlbumEventKind {
  ALBUM_CREATED
  GIF_ADDED_TO_ALBUM
  GIF_REMOVED_FROM_ALBUM
}

type Gif implements GifInterface {
  title: String!
  url: String!
  previewUrl: String
  id: String!
}

interface GifInterface {
  title: String!
  url: String!
  previewUrl: String
}

type GifSearchPage {
  items: [PreviewGif!]!
  offset: Int!
  limit: Int!
  totalCount: Int
  hasNextPage: Boolean!
}

type Mutation {
  createAlbum(name: String!): Album!
  addGifToAlbum(albumId: String!, title: String!, url: String!, previewUrl: String = null): Gif!
  removeGifFromAlbum(albumId: String!, gifId: String!): MutationError
}

type MutationError {
  code: String!
  message: String!
}

type PreviewGif implements GifInterface {
  title: String!
  url: String!
  previewUrl: String
}

type Query {
  searchGifs(query: String!, offset: Int! = 0, limit: Int! = 20): GifSearchPage!
  albums: [Album!]!
  album(id: String!): Album
}

type Subscription {
  albumEvents: AlbumEvent!
}