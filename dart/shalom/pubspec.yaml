name: shalom
description: "GraphQL client for Flutter/Dart with Rust-powered normalization runtime."
version: 0.1.0
homepage: https://github.com/nrbnlulu/shalom
repository: https://github.com/nrbnlulu/shalom

environment:
    sdk: ^3.11.4

dependencies:
    flutter_rust_bridge: 2.11.1
    plugin_platform_interface: ^2.0.2
    collection: ">=1.18.0 <3.0.0"
    async: ">=2.11.0 <3.0.0"
    meta: ">=1.15.0 <2.0.0"
    web_socket: ^1.0.1
    freezed_annotation: ^3.1.0
    native_toolchain_rust: ^1.0.3
    hooks: ^1.0.2

dev_dependencies:
    ffi: ^2.1.3
    ffigen: ^13.0.0
    flutter_lints: ^6.0.0
    lints: ^6.1.0
    test: ^1.24.0
    freezed: ^3.2.5
    build_runner: ^2.13.1
