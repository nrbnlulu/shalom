# https://taskfile.dev

version: "3"

vars:
    GREETING: Hello, World!
    DART_BIN:
        sh: |
            if command -v fvm > /dev/null 2>&1; then
              echo "fvm dart"
            else
              echo "dart"
            fi
    FLUTTER_BIN:
        sh: |
            if command -v fvm > /dev/null 2>&1; then
              echo "fvm flutter"
            else
              echo "flutter"
            fi

tasks:
    default:
        cmds:
            - echo "{{.GREETING}}"
        silent: true

    generate_rust_bindings:
        cmds:
            - cd dart/shalom && flutter_rust_bridge_codegen generate

    build_native_lib:
        desc: Build shalom_ffi and place it at the standardized .dart_tool/lib path used by dart/flutter tests
        cmds:
            - cargo build -p shalom_ffi --release
            - mkdir -p dart/shalom/.dart_tool/lib rust/shalom_dart_codegen/flutter_tests/.dart_tool/lib
            - cp target/release/libshalom_ffi.so dart/shalom/.dart_tool/lib/libshalom_ffi.so
            - cp target/release/libshalom_ffi.so rust/shalom_dart_codegen/flutter_tests/.dart_tool/lib/libshalom_ffi.so

    fmt:
        cmds:
            - cargo fmt --all
            - cd rust/shalom_dart_codegen/dart_tests && {{.DART_BIN}} format ./test ./lib
            - "{{.DART_BIN}} format ./dart"

    fix:
        cmds:
            - cd rust && cargo fmt
            - cd rust && cargo clippy --fix --allow-dirty

    lint:
        cmds:
            - cd rust && cargo fmt --all --check
            - cd rust && cargo clippy -- -D warnings
            - cd rust/shalom_dart_codegen/dart_tests && find . -type f -name "*.dart" -not -path "*/__graphql__/*" | xargs {{.DART_BIN}} format --set-exit-if-changed
            - cd rust/shalom_dart_codegen/dart_tests && {{.DART_BIN}} analyze ./test ./lib
            - cd dart/shalom && {{.DART_BIN}} analyze ./test ./lib
            - typos

    test:
        deps: [build_native_lib]
        cmds:
            - cd rust && cargo test -- --test-threads=2
            - cd dart/shalom && {{.DART_BIN}} test
