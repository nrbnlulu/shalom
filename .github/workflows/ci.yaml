name: CI/CD Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build-and-test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: 1.89.0
                  override: true
                  components: rustfmt, clippy

            - name: Setup Flutter SDK
              uses: flutter-actions/setup-flutter@v4
              with:
                  channel: stable

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install flutter packages
              run: |
                  cd rust/shalom_dart_codegen/dart_tests/
                  flutter packages get

            - name: Install flutter test packages
              run: |
                  cd rust/shalom_dart_codegen/flutter_tests/
                  flutter packages get

            - name: Build native library
              run: cargo build -p shalom_ffi --release

            - name: Test
              env:
                  FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR: ${{ github.workspace }}/target/release
              run: |
                  task test

            - name: Install typos
              run: |
                  cargo install typos-cli

            - name: Lint
              if: runner.os == 'Linux'
              run: task lint
